{% extends 'base.html' %}
{% block title %}{{ page.title }} | {{ t('site_name') }}{% endblock %}

{% block content %}
<section class="page-hero compact">
  <div class="container">
    <span class="section-tag light">{{ page.tag }}</span>
    <h1>{{ page.title }}</h1>
    <p>{{ page.description }}</p>
  </div>
</section>

<section class="page-content">
  <div class="container content-narrow">
    <div class="zikir-panel">
      <div class="zikir-targets">
        <button class="btn btn-sm btn-ghost" data-zikir-target="33">33</button>
        <button class="btn btn-sm btn-ghost" data-zikir-target="99">99</button>
        <button class="btn btn-sm btn-ghost" data-zikir-target="100">100</button>
      </div>
      <p class="zikir-meta">{{ t('zikir_target') }}: <strong id="zikirTarget">33</strong></p>
      <button class="zikir-btn" id="zikirBtn" type="button">
        <span id="zikirCount">0</span>
      </button>
      <div class="zikir-progress-wrap"><div class="zikir-progress" id="zikirProgress"></div></div>
      <button class="btn btn-ghost" id="zikirReset">{{ t('zikir_reset') }}</button>
    </div>
  </div>
</section>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/zikir.js') }}"></script>
{% endblock %}
