{% extends 'base.html' %}
{% block title %}{{ page.title }} | {{ t('site_name') }}{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
{% endblock %}

{% block content %}
<section class="page-hero compact">
  <div class="container">
    <span class="section-tag light">{{ page.tag }}</span>
    <h1>{{ page.title }}</h1>
    <p>{{ page.description }}</p>
  </div>
</section>

<section class="page-content">
  <div class="container">
    <div class="toolbar">
      <label>{{ t('city') }}</label>
      <select id="mosqueCity" class="city-select city-select-lg">
        {% for c in cities %}
        <option value="{{ c }}" {% if c == city %}selected{% endif %}>{{ c }}</option>
        {% endfor %}
      </select>
      <button class="btn btn-primary" id="mosqueNearbyBtn">{{ t('find_nearby') }}</button>
    </div>
    <div class="mosque-layout">
      <div id="mosqueMap" class="mosque-map"></div>
      <div id="mosqueList" class="mosque-list"></div>
    </div>
  </div>
</section>
{% endblock %}

{% block extra_js %}
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="{{ url_for('static', filename='js/mosque_map.js') }}"></script>
{% endblock %}
