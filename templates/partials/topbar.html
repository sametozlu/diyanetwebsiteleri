<div class="top-bar">
  <div class="container top-bar-inner">
    <div class="top-bar-left">
      <a href="tel:190" class="top-bar-item">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        {{ t('fetva_line') }}
      </a>
      <span class="top-bar-item" id="hijriDateTop">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span id="hijriDateText">{% if hijri_date %}{{ hijri_date }}{% else %}{{ t('hijri_calendar') }}{% endif %}</span>
      </span>
    </div>
    <div class="top-bar-right">
      <a href="{{ url_for('set_language', lang_code='tr') }}" class="lang-btn {% if lang == 'tr' %}active{% endif %}">TR</a>
      <a href="{{ url_for('set_language', lang_code='ar') }}" class="lang-btn {% if lang == 'ar' %}active{% endif %}">AR</a>
      <a href="{{ url_for('set_language', lang_code='en') }}" class="lang-btn {% if lang == 'en' %}active{% endif %}">EN</a>
      <a href="{{ url_for('radyo') }}" class="top-bar-live">
        <span class="live-dot"></span> {{ t('live_radio') }}
      </a>
    </div>
  </div>
</div>
