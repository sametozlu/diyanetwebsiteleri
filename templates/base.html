<!DOCTYPE html>
<html lang="{{ lang }}" dir="{{ dir }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{% block meta_description %}{{ t('meta_description') }}{% endblock %}">
  <title>{% block title %}{{ t('site_name') }}{% endblock %}</title>
  <link rel="icon" href="{{ url_for('static', filename='images/diyanet-logo.svg') }}" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="manifest" href="{{ url_for('manifest') }}">
  <meta name="theme-color" content="#e31919">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  {% block extra_css %}{% endblock %}
  <script>
    window.LANG = {{ lang|tojson }};
    window.I18N = {{ js_strings|tojson }};
  </script>
</head>
<body>
  <div class="pattern-overlay" aria-hidden="true"></div>
  <div id="toastContainer" class="toast-container"></div>

  {% include 'partials/topbar.html' %}
  {% include 'partials/header.html' %}

  <main id="main-content">
    {% block content %}{% endblock %}
  </main>

  {% include 'partials/footer.html' %}
  {% include 'partials/radio_widget.html' %}

  <button class="scroll-top" id="scrollTop" aria-label="{{ t('scroll_top') }}">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"/></svg>
  </button>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  <script src="{{ url_for('static', filename='js/dark_mode.js') }}"></script>
  <script src="{{ url_for('static', filename='js/pwa.js') }}"></script>
  <script src="{{ url_for('static', filename='js/prayer_countdown.js') }}"></script>
  <script src="{{ url_for('static', filename='js/radio.js') }}"></script>
  <script src="{{ url_for('static', filename='js/notifications.js') }}"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
