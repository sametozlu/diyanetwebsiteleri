<div class="radio-widget" id="radioWidget">
  <div class="radio-widget-header">
    <div class="radio-widget-info">
      <span class="live-dot"></span>
      <span class="radio-widget-title" id="widgetStationName">Diyanet Radyo</span>
    </div>
    <div class="radio-widget-actions">
      <button class="radio-widget-btn" id="widgetPlayBtn" aria-label="Oynat/Durdur">
        <svg class="icon-play" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        <svg class="icon-pause" viewBox="0 0 24 24" fill="currentColor" hidden><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
      </button>
      <button class="radio-widget-btn" id="widgetExpandBtn" aria-label="Genişlet">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
      </button>
      <button class="radio-widget-btn" id="widgetCloseBtn" aria-label="Kapat">✕</button>
    </div>
  </div>
  <audio id="globalRadioPlayer" preload="none"></audio>
</div>
